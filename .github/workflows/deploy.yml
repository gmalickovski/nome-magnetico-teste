name: Deploy Nome Magnético para VPS

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências e Build
        run: |
          echo "PUBLIC_SUPABASE_URL=https://supabase.studiomlk.com.br" >> .env
          echo "PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzY3MTYzMTYyLCJleHAiOjIwODI1MjMxNjIsInJlZiI6InNpbmNyb2FwcF9hbm9uIn0.fxAcgzxGZe3ybA1-Ocu2AhvlNPuM2-ysE05IAcgfBaA" >> .env
          npm ci
          NODE_ENV=production npm run build

      - name: Deploy para a VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: "103.199.185.152"
          username: "root"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          # start.mjs adicionado na linha abaixo para ser enviado à VPS
          source: "dist,package.json,ecosystem.config.cjs,start.mjs"
          target: "/var/www/webapp/nome-magnetico"

      - name: Reiniciar Serviço no Servidor
        uses: appleboy/ssh-action@master
        with:
          host: "103.199.185.152"
          username: "root"
          port: 2222
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/webapp/nome-magnetico
            npm install --omit=dev
            npm install dotenv

            # Reload sem downtime — reinicia instâncias uma a uma (rolling restart).
            # Fallback para start se o processo ainda não existir (primeiro deploy).
            pm2 reload ecosystem.config.cjs --update-env 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save