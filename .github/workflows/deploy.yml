name: Deploy Nome Magnético para VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências e Build
        run: |
          npm ci
          NODE_ENV=production npm run build

      - name: Deploy para a VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: "103.199.185.152"
          username: "root"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          # start.mjs adicionado na linha abaixo para ser enviado à VPS
          source: "dist,package.json,ecosystem.config.cjs,start.mjs"
          target: "/var/www/webapp/nome-magnetico"

      - name: Reiniciar Serviço no Servidor
        uses: appleboy/ssh-action@master
        with:
          host: "103.199.185.152"
          username: "root"
          port: 2222
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/webapp/nome-magnetico
            npm install --omit=dev
            npm install dotenv
            pm2 delete nome-magnetico 2>/dev/null || true
            
            # Inicia o PM2 lendo o novo ecosystem que chama o start.mjs
            pm2 start ecosystem.config.cjs
            pm2 save