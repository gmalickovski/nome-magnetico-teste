# HTTP → HTTPS com www
server {
    listen 80;
    listen [::]:80;
    server_name nomemagnetico.com.br www.nomemagnetico.com.br;
    return 301 https://www.nomemagnetico.com.br$request_uri;
}

# HTTPS sem www → HTTPS com www
# Exceção: /api/* é proxiado diretamente (webhooks de terceiros não seguem 301)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nomemagnetico.com.br;

    ssl_certificate /etc/letsencrypt/live/nomemagnetico.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nomemagnetico.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # APIs e webhooks: proxy direto sem redirect (Asaas, Stripe, n8n)
    location /api/ {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tudo mais: redireciona para www (SEO canônico)
    location / {
        return 301 https://www.nomemagnetico.com.br$request_uri;
    }
}

# Servidor principal (www)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.nomemagnetico.com.br;

    ssl_certificate /etc/letsencrypt/live/nomemagnetico.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nomemagnetico.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff2;

    location /_astro/ {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
