# Configuração nginx para o servidor Chatwoot (suporte.studiomlk.com.br)
# Aplicar em: /etc/nginx/sites-available/chatwoot
# Habilitar com: sudo ln -s /etc/nginx/sites-available/chatwoot /etc/nginx/sites-enabled/
# Validar com:  sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name suporte.studiomlk.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name suporte.studiomlk.com.br;

    ssl_certificate     /etc/letsencrypt/live/suporte.studiomlk.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suporte.studiomlk.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # CRÍTICO: permite headers com underscore (ex: api_access_token do Chatwoot)
    # Sem isto o nginx dropa o header e a API retorna 401
    underscores_in_headers on;

    # Compressão
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    # CRÍTICO: WebSocket para ActionCable (Chatwoot real-time)
    # Sem este bloco o SDK do Chatwoot falha com:
    # "WebSocket connection to 'wss://.../cable' failed"
    location /cable {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;   # 24h — mantém o WebSocket aberto sem timeout
        proxy_send_timeout 86400;
    }

    # Resto da aplicação Chatwoot
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
